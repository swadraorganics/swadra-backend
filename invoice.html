<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Invoice</title>

<script src="page-storage-sync.js"></script>
<script>
window.installSwadraPageStorageSync({
  pageName: "invoice page",
  persistedKeys: [
    "currentUser",
    "users",
    "currentOrderId"
  ]
});
</script>
<link rel="stylesheet" href="invoice.css">

<script src="https://cdnjs.cloudflare.com/ajax/libs/html2pdf.js/0.10.1/html2pdf.bundle.min.js"></script>

<style>html,body{background:#f1e3e3 !important;}</style>
<link rel="stylesheet" href="swadra-responsive.css">
<script src="api-config.js"></script></head>

<body>

<!-- BRAND HEADER -->
<div class="brand">
Swadra Organics
</div>

<div class="tagline">
Choose Healthy â€¢ Be Swadra Family
</div>

<div class="main" id="invoice">

<h2>Tax Invoice</h2>

<p><strong>Order ID:</strong> <span id="orderId"></span></p>
<p><strong>Date:</strong> <span id="date"></span></p>

<!-- ADDRESS -->
<div class="address-section">

<div>
<h4>Billing Address</h4>
<p id="billingName"></p>
<p id="billingAddress"></p>
<p id="billingPhone"></p>
</div>

<div>
<h4>Delivery Address</h4>
<p id="deliveryName"></p>
<p id="deliveryAddress"></p>
<p id="deliveryPhone"></p>
</div>

</div>

<hr>

<h3>Order Summary</h3>
<div id="items"></div>

<hr>

<!-- GST BREAKDOWN -->
<div class="price-box">

<p>Subtotal: â‚¹<span id="subtotal"></span></p>

<p>CGST (2.5%): â‚¹<span id="cgst"></span></p>
<p>SGST (2.5%): â‚¹<span id="sgst"></span></p>

<p>Delivery: â‚¹<span id="delivery"></span></p>
<p>Discount: â‚¹<span id="discount"></span></p>

<h3>Total: â‚¹<span id="total"></span></h3>

</div>

<hr>

<div class="payment-info">
<h4>Payment Method</h4>
<p>UPI Payment</p>

<h4>Status</h4>
<p class="paid">Paid âœ…</p>
</div>

<div class="actions">
<button onclick="downloadPDF()">Download Invoice</button>
<button onclick="shareWhatsApp()">Share on WhatsApp</button>
</div>

</div>

<script>
const API_BASE = window.SWADRA_API_BASE || "";

function escapeHtml(value){
  return String(value ?? "").replace(/[&<>"']/g, char => ({
    "&":"&amp;",
    "<":"&lt;",
    ">":"&gt;",
    '"':"&quot;",
    "'":"&#039;"
  }[char]));
}

function formatMoney(value){
  return Math.round(Number(value) || 0).toLocaleString("en-IN");
}

function getCurrentOrderId(){
  return String(localStorage.getItem("currentOrderId") || "").trim();
}

async function fetchOrder(orderId){
  const response = await fetch(`${API_BASE}/api/orders/${encodeURIComponent(orderId)}`, { cache:"no-store" });
  const data = await response.json().catch(()=>({}));
  if(!response.ok || !data?.order){
    throw new Error(data?.error || "Order not found");
  }
  return data.order;
}

function buildAddress(order){
  const shipping = order?.shipping || {};
  return shipping.address || [
    shipping.house,
    shipping.area,
    shipping.postoffice,
    shipping.city,
    shipping.district,
    shipping.state,
    shipping.pincode
  ].filter(Boolean).join(", ");
}

function getItemLineTotal(item){
  const qty = Number(item?.qty) || 1;
  const originalLineTotal = Math.round((Number(item?.price) || 0) * qty);
  return Math.round(Number(item?.discountedLineTotal || item?.displayLineTotal || originalLineTotal));
}

function renderInvoice(order){
  const items = Array.isArray(order?.items) ? order.items : [];
  const subtotal = Math.round(Number(order?.couponAdjustedSellingTotal || order?.sellingTotal || order?.total || 0));
  const discount = Math.round(Number(order?.couponDiscount || 0));
  const delivery = Math.round(Number(order?.delivery || 0));
  const total = Math.round(Number(order?.total || (subtotal + delivery)));
  const gstTotal = Math.round(Number(order?.gstTotal || 0));
  const cgst = gstTotal / 2;
  const sgst = gstTotal / 2;
  const shippingName = order?.shipping?.name || order?.userId || "Customer";
  const shippingPhone = order?.shipping?.phone || "Phone not provided";
  const shippingEmail = order?.shipping?.email || order?.userId || "Email not provided";
  const shippingAddress = buildAddress(order) || "Address not provided";

  document.getElementById("orderId").innerText = order?.id || "";
  document.getElementById("date").innerText = new Date(order?.date || order?.createdAt || Date.now()).toLocaleDateString("en-IN");
  document.getElementById("billingName").innerText = `${shippingName} (${shippingEmail})`;
  document.getElementById("billingAddress").innerText = shippingAddress;
  document.getElementById("billingPhone").innerText = shippingPhone;
  document.getElementById("deliveryName").innerText = shippingName;
  document.getElementById("deliveryAddress").innerText = shippingAddress;
  document.getElementById("deliveryPhone").innerText = shippingPhone;

  const itemsDiv = document.getElementById("items");
  itemsDiv.innerHTML = items.map(item=>`
<div class="item">
<span>${escapeHtml(item?.name || "Swadra Product")}</span>
<span>₹${formatMoney(getItemLineTotal(item))} × ${Math.max(1, Number(item?.qty) || 1)}</span>
</div>
`).join("");

  document.getElementById("subtotal").innerText = formatMoney(subtotal);
  document.getElementById("cgst").innerText = formatMoney(cgst);
  document.getElementById("sgst").innerText = formatMoney(sgst);
  document.getElementById("delivery").innerText = formatMoney(delivery);
  document.getElementById("discount").innerText = formatMoney(discount);
  document.getElementById("total").innerText = formatMoney(total);
}

async function loadInvoice(){
  const orderId = getCurrentOrderId();
  if(!orderId){
    document.getElementById("items").innerHTML = `<div class="item"><span>No order selected</span><span>Please open invoice from My Orders.</span></div>`;
    return;
  }

  try{
    const order = await fetchOrder(orderId);
    renderInvoice(order);
  }catch(error){
    document.getElementById("items").innerHTML = `<div class="item"><span>Invoice load failed</span><span>${escapeHtml(error.message || "Unable to fetch order")}</span></div>`;
  }
}

// PDF
function downloadPDF(){
html2pdf().from(document.getElementById("invoice")).save("invoice.pdf");
}

function shareWhatsApp(){
let phone = document.getElementById("deliveryPhone").innerText || "";
let name = (document.getElementById("deliveryName").innerText || "Customer").trim();
let total = document.getElementById("total").innerText;

// format number (India)
if(phone.startsWith("0")) phone = phone.slice(1);
if(!phone.startsWith("91")) phone = "91" + phone;

// message
let message = `Hello ${name},

ðŸ§¾ Your Swadra Organics Order Invoice

Total Amount: â‚¹${total}

Please find your invoice attached.

Thank you for shopping with us ðŸŒ¿`;

// open WhatsApp
let url = `https://wa.me/${phone}?text=${encodeURIComponent(message)}`;

window.open(url, "_blank");
}

window.onload = loadInvoice;

</script>

</body>
</html>

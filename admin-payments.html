  <style>
    * { box-sizing: border-box; }

    :root{
      --primary:#7a3d3d;
      --primary-dark:#5f2f2f;
      --bg:#f8f5f2;
      --card:#ffffff;
      --text:#1f1f1f;
      --muted:#6c6c6c;
      --line:#e7dfd7;
      --success:#137a43;
      --warn:#b36b00;
      --danger:#c62828;
      --shadow:0 10px 30px rgba(0,0,0,0.08);
    }

    body{
      margin:0;
      font-family:Arial, Helvetica, sans-serif;
      background:var(--bg);
      color:var(--text);
    }

    .wrap{
      width:min(100%, 1880px);
      margin:0 auto;
      padding:20px 24px 28px;
    }

    .topbar{
      background:linear-gradient(135deg,var(--primary),var(--primary-dark));
      color:#fff;
      padding:24px 28px;
      border-radius:22px;
      box-shadow:var(--shadow);
      margin-bottom:18px;
    }

    .topbar h1{
      margin:0;
      font-size:30px;
      line-height:1.2;
    }

    .topbar p{
      margin:8px 0 0;
      opacity:0.92;
      font-size:15px;
      line-height:1.6;
    }

    .toolbar{
      display:flex;
      gap:12px;
      flex-wrap:wrap;
      margin-bottom:18px;
    }

    button, .toolbar a{
      border:none;
      outline:none;
      cursor:pointer;
      border-radius:12px;
      padding:12px 18px;
      font-size:14px;
      font-weight:700;
      transition:0.2s ease;
      text-decoration:none;
      display:inline-flex;
      align-items:center;
      justify-content:center;
    }

    .btn-primary{ background:var(--primary); color:#fff; }
    .btn-primary:hover{ background:var(--primary-dark); }
    .btn-secondary{ background:#1d6d5c; color:#fff; }
    .btn-dark{ background:#333; color:#fff; }
    .btn-danger{ background:var(--danger); color:#fff; }
    .btn-light{ background:#eee7df; color:#3a2b2b; }

    .stats-grid{
      display:grid;
      grid-template-columns:repeat(4,minmax(0,1fr));
      gap:14px;
      margin-bottom:18px;
    }

    .stat-card{
      background:var(--card);
      border-radius:18px;
      box-shadow:var(--shadow);
      padding:16px;
    }

    .stat-card .label{
      font-size:12px;
      color:var(--muted);
      font-weight:700;
    }

    .stat-card .value{
      font-size:28px;
      font-weight:800;
      margin-top:8px;
      color:var(--primary);
    }

    .grid{
      display:grid;
      grid-template-columns:1fr;
      gap:18px;
      align-items:start;
    }

    .panel{
      background:var(--card);
      border-radius:22px;
      box-shadow:var(--shadow);
      padding:22px 24px;
      width:100%;
    }

    .panel h2{
      margin:0 0 14px;
      font-size:24px;
    }

    .filters-panel{
      position:sticky;
      top:118px;
      z-index:20;
      border-radius:0 0 18px 18px;
    }

    .filters-panel .product-form{
      display:grid;
      grid-template-columns:minmax(280px,1.4fr) minmax(360px,1.2fr) minmax(420px,1.6fr);
      gap:12px 16px;
      align-items:end;
    }

    .filters-panel .row{
      margin:0;
    }

    .filters-panel .summary-box{
      margin:0;
      grid-template-columns:repeat(4,minmax(92px,1fr));
    }

    .product-form{
      display:grid;
      gap:16px;
    }

    .row{
      display:grid;
      grid-template-columns:repeat(2,minmax(0,1fr));
      gap:14px;
    }

    .row.one{ grid-template-columns:1fr; }

    .field{
      display:flex;
      flex-direction:column;
      gap:6px;
    }

    .field label{
      font-size:13px;
      font-weight:700;
      color:#3b2a2a;
    }

    .field input, .field select{
      width:100%;
      border:1px solid var(--line);
      background:#fff;
      border-radius:12px;
      padding:12px 13px;
      font-size:14px;
      color:var(--text);
      outline:none;
    }

    .field input:focus, .field select:focus{
      border-color:var(--primary);
      box-shadow:0 0 0 3px rgba(122,61,61,0.10);
    }

    .summary-box{
      display:grid;
      grid-template-columns:repeat(2,1fr);
      gap:12px;
      margin-top:4px;
    }

    .summary-card{
      background:#fbf8f5;
      border:1px solid var(--line);
      border-radius:16px;
      padding:14px;
    }

    .summary-card .label{
      font-size:12px;
      color:var(--muted);
      margin-bottom:6px;
      font-weight:700;
    }

    .summary-card .value{
      font-size:24px;
      font-weight:800;
      color:#222;
    }

    .summary-card.green .value{ color:var(--success); }
    .summary-card.gold .value{ color:var(--warn); }
    .summary-card.red .value{ color:var(--danger); }

    .hint{
      font-size:12px;
      color:#7d7268;
      line-height:1.6;
    }

    .payments-list{
      display:grid;
      gap:14px;
      padding-right:4px;
    }

    .payment-card{
      border:1px solid var(--line);
      border-radius:18px;
      background:#fffdfa;
      padding:16px;
      display:grid;
      gap:12px;
    }

    .payment-head{
      display:flex;
      justify-content:space-between;
      align-items:flex-start;
      gap:12px;
      flex-wrap:wrap;
    }

    .payment-head h3{
      margin:0;
      font-size:20px;
      line-height:1.3;
    }

    .badge-wrap{
      display:flex;
      gap:8px;
      flex-wrap:wrap;
      margin-top:6px;
    }

    .badge{
      padding:7px 11px;
      border-radius:999px;
      font-size:12px;
      font-weight:700;
      background:#f2ebe4;
      color:#433;
    }

    .badge.green{ background:#e7f5ec; color:var(--success); }
    .badge.red{ background:#fdeceb; color:var(--danger); }
    .badge.gold{ background:#fff3dc; color:var(--warn); }

    .card-grid{
      display:grid;
      grid-template-columns:repeat(3,1fr);
      gap:12px;
    }

    .mini{
      background:#faf6f2;
      border:1px solid var(--line);
      border-radius:14px;
      padding:12px;
    }

    .mini .k{
      font-size:12px;
      color:var(--muted);
      font-weight:700;
      margin-bottom:5px;
    }

    .mini .v{
      font-size:16px;
      font-weight:800;
      word-break:break-word;
    }

    .card-actions{
      display:flex;
      gap:10px;
      flex-wrap:wrap;
    }

    .empty{
      padding:20px;
      border:1px dashed #d8cdc2;
      border-radius:16px;
      color:var(--muted);
      text-align:center;
      background:#fffdfa;
    }

    .small-note{
      font-size:12px;
      color:var(--muted);
      line-height:1.6;
      margin-top:6px;
    }

    @media (max-width:1200px){
      .stats-grid{ grid-template-columns:repeat(2,1fr); }
      .filters-panel{
        position:static;
        border-radius:22px;
      }
      .filters-panel .product-form{
        grid-template-columns:1fr;
      }
    }

    @media (max-width:900px){
      .row, .summary-box, .card-grid{
        grid-template-columns:repeat(2,1fr);
      }
    }

    @media (max-width:600px){
      .row, .summary-box, .card-grid, .stats-grid{
        grid-template-columns:1fr;
      }
      .topbar h1{ font-size:24px; }
      .wrap{ padding:16px; }
    }
  </style>

        <div class="product-form">

                type="text"

  <script>
    const dataApi = window.SWADRA_DATA || null;
    const firestoreFactory = window.firebase && typeof window.firebase.firestore === "function"
      ? window.firebase.firestore.bind(window.firebase)
      : null;
    const runtimeReviewMap = {};

    function safeJsonParse(value, fallback){
      try{
        const parsed = JSON.parse(value);
        return parsed ?? fallback;
      }catch(error){
        return fallback;
      }
    }

    const API_BASE = window.SWADRA_API_BASE || "";

    function rupee(value){
      return "₹" + Number(value || 0).toFixed(0);
    }

    function escapeHtml(str){
      return String(str || "")
        .replaceAll("&", "&amp;")
        .replaceAll("<", "&lt;")
        .replaceAll(">", "&gt;")
        .replaceAll('"', "&quot;")
        .replaceAll("'", "&#039;");
    }

    function normalizeText(value){
      return String(value || "").trim().toLowerCase();
    }

    function getValueByPossibleKeys(obj, keys){
      for(const key of keys){
        if(obj && obj[key] !== undefined && obj[key] !== null && String(obj[key]).trim() !== ""){
          return obj[key];
        }
      }
      return "";
    }

    function getReviewMap(){
      return runtimeReviewMap;
    }

    async function persistReviewedState(paymentId, reviewed, orderId){
      runtimeReviewMap[paymentId] = !!reviewed;
      if(!orderId || !firestoreFactory) return;
      try{
        const db = firestoreFactory();
        await db.collection("orders").doc(String(orderId)).set({
          adminPaymentReviewed: !!reviewed,
          updatedAt: new Date().toISOString()
        }, { merge:true });
      }catch(error){
        console.error("payment review save failed", error);
      }
    }

    function normalizeStatus(raw){
      const value = normalizeText(raw);
      if(!value) return "unknown";
      if(value.includes("refund")) return "failed";
      if(value.includes("cancel")) return "failed";
      if(value.includes("paid") || value.includes("success") || value.includes("completed") || value === "captured") return "paid";
      if(value.includes("pending") || value.includes("processing") || value.includes("created")) return "pending";
      if(value.includes("fail")) return "failed";
      if(value.includes("cod") || value.includes("cash")) return "cod";
      return value;
    }

    function parseAnyDate(value){
      if(!value) return null;
      const date = new Date(value);
      if(!isNaN(date.getTime())) return date;

      const secondTry = new Date(String(value).replace(/,/g, ""));
      if(!isNaN(secondTry.getTime())) return secondTry;

      return null;
    }

    function buildPaymentId(raw, sourceKey, index){
      const detail = raw && raw.detail && typeof raw.detail === "object" ? raw.detail : {};
      const directId = getValueByPossibleKeys(raw, ["paymentId","id","txnId","transactionId","razorpayPaymentId"]) || getValueByPossibleKeys(detail, ["paymentId","id","txnId","transactionId","razorpayPaymentId"]);
      const orderId = getValueByPossibleKeys(raw, ["orderId","orderID","invoiceId","localOrderId"]) || getValueByPossibleKeys(detail, ["orderId","orderID","invoiceId","localOrderId"]);
      const email = getValueByPossibleKeys(raw, ["email","emailId"]);
      return String(directId || orderId || `${sourceKey}_${email || "record"}_${index}`);
    }

    function extractAmount(raw, sourceKey){
      const directAmount = Number(getValueByPossibleKeys(raw, ["finalAmount","total","amount","totalAmount","paidAmount","grandTotal","paymentAmount"]));
      if(directAmount > 0){
        const isPaiseAmount = sourceKey === "backendPaymentAttempts" && directAmount >= 10000;
        return isPaiseAmount ? Math.round(directAmount / 100) : directAmount;
      }
      const amountPaise = Number(raw.amountPaise || 0);
      if(amountPaise > 0) return Math.round(amountPaise / 100);

      const items = raw.items || raw.products || raw.cartItems || [];
      if(Array.isArray(items) && items.length){
        return items.reduce((sum, item) => {
          const price = Number(getValueByPossibleKeys(item, ["price","sellingPrice","amount"])) || 0;
          const qty = Number(getValueByPossibleKeys(item, ["quantity","qty","count"])) || 1;
          return sum + (price * qty);
        }, 0);
      }

      return 0;
    }

    function getInstrumentLabel(raw){
      const instrument = raw && raw.paymentInstrument && typeof raw.paymentInstrument === "object" ? raw.paymentInstrument : {};
      const method = String(getValueByPossibleKeys(raw, ["paymentMethod","method","mode"]) || instrument.method || "").trim().toLowerCase();
      if(method === "upi"){
        return instrument.vpa ? "UPI • " + instrument.vpa : "UPI";
      }
      if(method === "card"){
        const parts = ["Card"];
        if(instrument.network) parts.push(String(instrument.network).toUpperCase());
        if(instrument.last4) parts.push("xxxx " + instrument.last4);
        return parts.join(" • ");
      }
      if(method === "netbanking"){
        return instrument.bank ? "Netbanking • " + instrument.bank : "Netbanking";
      }
      if(method === "wallet"){
        return instrument.wallet ? "Wallet • " + instrument.wallet : "Wallet";
      }
      return String(raw.paymentInstrumentLabel || "").trim();
    }

    function normalizePayment(raw, sourceKey, index){
      const reviewMap = getReviewMap();
      const detail = raw && raw.detail && typeof raw.detail === "object" ? raw.detail : {};
      const id = buildPaymentId(raw, sourceKey, index);
      const rawOrderId = getValueByPossibleKeys(raw, ["orderId","orderID","invoiceId","order_id","localOrderId"]) || getValueByPossibleKeys(detail, ["orderId","orderID","invoiceId","order_id","localOrderId"]);
      const orderId = String(rawOrderId || (/^SWO/i.test(String(raw.id || "")) ? raw.id : "")).trim();
      const paymentId = String(getValueByPossibleKeys(raw, ["paymentId","txnId","transactionId","razorpayPaymentId"]) || getValueByPossibleKeys(detail, ["paymentId","txnId","transactionId","razorpayPaymentId"]) || id).trim();
      const customerName = String(getValueByPossibleKeys(raw, ["name","customerName","fullName","username"])).trim() || "Unknown Customer";
      const email = String(getValueByPossibleKeys(raw, ["email","emailId","mail"])).trim();
      const mobile = String(getValueByPossibleKeys(raw, ["mobile","phone","phoneNumber","mobileNumber","contactNumber"])).trim();
      const method = String(getValueByPossibleKeys(raw, ["paymentMethod","method","mode"])).trim() || "Unknown";
      const orderStatusText = normalizeText(getValueByPossibleKeys(raw, ["orderStatus","status","deliveryStatus"]));
      const status = orderStatusText.includes("cancel")
        ? "failed"
        : normalizeStatus(getValueByPossibleKeys(raw, ["payment","paymentStatus","status","payment_state","refundStatus"]));
      const amount = extractAmount(raw, sourceKey);
      const refundStatus = String(getValueByPossibleKeys(raw, ["refundStatus","razorpayRefundStatus","razorpayRefundGatewayStatus"])).trim();
      const refundId = String(getValueByPossibleKeys(raw, ["refundId","razorpayRefundId"])).trim();
      const refundAmount = Number(getValueByPossibleKeys(raw, ["refundAmount"])) || 0;
      const dateRaw = getValueByPossibleKeys(raw, ["createdAt","date","orderedAt","timestamp","time","paidAt"]);
      const date = parseAnyDate(dateRaw);
      const reviewed = raw.adminPaymentReviewed != null ? Boolean(raw.adminPaymentReviewed) : Boolean(reviewMap[id]);
      reviewMap[id] = reviewed;

      return {
        id,
        sourceKey,
        orderId,
        paymentId,
        customerName,
        email,
        mobile,
        method,
        instrumentLabel: getInstrumentLabel(raw),
        status,
        cancelled: orderStatusText.includes("cancel") || normalizeText(getValueByPossibleKeys(raw, ["refundStatus","payment"])).includes("refund"),
        refundStatus,
        refundId,
        refundAmount,
        amount,
        reviewed,
        dateLabel: date ? date.toLocaleString("en-IN") : "-",
        searchText: [
          id,
          orderId,
          paymentId,
          customerName,
          email,
          mobile,
          method,
          status
        ].join(" ").toLowerCase()
      };
    }

    function getPaymentMergeKey(payment){
      const payId = String(payment.paymentId || "").trim();
      const orderId = String(payment.orderId || "").trim();
      if(orderId) return "order:" + orderId;
      if(payId && /^pay_/i.test(payId)) return "pay:" + payId;
      return "id:" + String(payment.id || "");
    }

    function paymentStatusRank(status){
      if(status === "paid") return 4;
      if(status === "failed") return 3;
      if(status === "pending") return 2;
      if(status === "cod") return 1;
      return 0;
    }

    function mergePaymentRecord(existing, incoming){
      if(!existing) return incoming;
      if(incoming.cancelled && !existing.cancelled) return { ...existing, ...incoming, status:"failed", cancelled:true };
      if(existing.cancelled && !incoming.cancelled) return { ...incoming, ...existing, status:"failed", cancelled:true };
      const preferred = paymentStatusRank(incoming.status) >= paymentStatusRank(existing.status) ? incoming : existing;
      const other = preferred === incoming ? existing : incoming;
      return {
        ...other,
        ...preferred,
        id: preferred.id || other.id,
        orderId: preferred.orderId || other.orderId,
        paymentId: /^pay_/i.test(String(preferred.paymentId || "")) ? preferred.paymentId : (other.paymentId || preferred.paymentId),
        customerName: preferred.customerName !== "Unknown Customer" ? preferred.customerName : other.customerName,
        email: preferred.email || other.email,
        mobile: preferred.mobile || other.mobile,
        method: preferred.method !== "Unknown" ? preferred.method : other.method,
        instrumentLabel: preferred.instrumentLabel || other.instrumentLabel,
        amount: Number(preferred.amount || 0) > 0 ? preferred.amount : other.amount,
        cancelled: Boolean(preferred.cancelled || other.cancelled),
        refundStatus: preferred.refundStatus || other.refundStatus,
        refundId: preferred.refundId || other.refundId,
        refundAmount: Number(preferred.refundAmount || 0) > 0 ? preferred.refundAmount : other.refundAmount,
        reviewed: Boolean(preferred.reviewed || other.reviewed),
        sourceKey: Array.from(new Set([other.sourceKey, preferred.sourceKey].filter(Boolean))).join(", ")
      };
    }

    async function getFirestorePayments(){
      if(!firestoreFactory) return [];
      try{
        const db = firestoreFactory();
        const snapshot = await db.collection("orders").get();
        const payments = [];
        snapshot.forEach(function(doc){
          const order = doc.data() || {};
          payments.push(normalizePayment({ ...order, id: order.id || doc.id }, "firestoreOrders", payments.length));
        });
        return payments;
      }catch(error){
        console.error("firestore payments fetch failed", error);
        return [];
      }
    }

    async function getBackendPayments(){
      const merged = [];
      try{
        const [attemptsResponse, ordersResponse] = await Promise.all([
          fetch(API_BASE + "/api/payments/attempts", { cache:"no-store" }),
          fetch(API_BASE + "/api/orders", { cache:"no-store" }).catch(()=>null)
        ]);

        if(attemptsResponse && attemptsResponse.ok){
          const attemptsData = await attemptsResponse.json().catch(()=>({ ok:false, attempts:[] }));
          (Array.isArray(attemptsData.attempts) ? attemptsData.attempts : []).forEach((item, index)=>{
            merged.push(normalizePayment(item, "backendPaymentAttempts", index));
          });
        }

        if(ordersResponse && ordersResponse.ok){
          const ordersData = await ordersResponse.json().catch(()=>({ ok:false, orders:[] }));
          (Array.isArray(ordersData.orders) ? ordersData.orders : []).forEach((item, index)=>{
            merged.push(normalizePayment(item, "backendOrders", index));
          });
        }
      }catch(error){
        console.error("backend payments fetch failed", error);
      }
      return merged;
    }

    function getFilteredPayments(payments){
      const query = normalizeText(document.getElementById("searchInput").value);
      const statusFilter = document.getElementById("statusFilter").value;
      const reviewFilter = document.getElementById("reviewFilter").value;

      return payments.filter((payment) => {
        const queryMatch = !query || payment.searchText.includes(query);
        const statusMatch = statusFilter === "all" || payment.status === statusFilter;
        const reviewMatch =
          reviewFilter === "all" ||
          (reviewFilter === "reviewed" && payment.reviewed) ||
          (reviewFilter === "unreviewed" && !payment.reviewed);

        return queryMatch && statusMatch && reviewMatch;
      });
    }

    function renderStats(allPayments, visiblePayments){
      const totalPaid = allPayments
        .filter(item => item.status === "paid")
        .reduce((sum, item) => sum + Number(item.amount || 0), 0);

      const totalPending = allPayments
        .filter(item => item.status === "pending")
        .reduce((sum, item) => sum + Number(item.amount || 0), 0);

      const reviewedCount = allPayments.filter(item => item.reviewed).length;
      const failedCount = allPayments.filter(item => item.status === "failed").length;

      document.getElementById("paymentStats").innerHTML = `
        <div class="stat-card">
          <div class="label">Total Records</div>
          <div class="value">${allPayments.length}</div>
        </div>
        <div class="stat-card">
          <div class="label">Paid Amount</div>
          <div class="value">${rupee(totalPaid)}</div>
        </div>
        <div class="stat-card">
          <div class="label">Pending Amount</div>
          <div class="value">${rupee(totalPending)}</div>
        </div>
        <div class="stat-card">
          <div class="label">Failed Records</div>
          <div class="value">${failedCount}</div>
        </div>
      `;

      document.getElementById("visiblePaymentsView").textContent = visiblePayments.length;
      document.getElementById("paidAmountView").textContent = rupee(
        visiblePayments
          .filter(item => item.status === "paid")
          .reduce((sum, item) => sum + Number(item.amount || 0), 0)
      );
      document.getElementById("pendingAmountView").textContent = rupee(
        visiblePayments
          .filter(item => item.status === "pending")
          .reduce((sum, item) => sum + Number(item.amount || 0), 0)
      );
      document.getElementById("reviewedPaymentsView").textContent = reviewedCount;
    }

    async function renderPayments(){
      const firestorePayments = await getFirestorePayments();
      const backendPayments = await getBackendPayments();
      const paymentMap = new Map();
      [...firestorePayments, ...backendPayments].forEach((payment)=>{
        const key = getPaymentMergeKey(payment);
        paymentMap.set(key, mergePaymentRecord(paymentMap.get(key), payment));
      });
      const allPayments = Array.from(paymentMap.values());
      const payments = getFilteredPayments(allPayments);
      const paymentsList = document.getElementById("paymentsList");

      renderStats(allPayments, payments);

      if(!payments.length){
        paymentsList.innerHTML = `<div class="empty">No payment records found.</div>`;
        return;
      }

      paymentsList.innerHTML = payments.map((payment) => {
        const statusClass =
          payment.status === "paid" ? "green" :
          payment.status === "pending" ? "gold" :
          payment.status === "failed" ? "red" : "";

        return `
          <div class="payment-card">
            <div class="payment-head">
              <div>
                <h3>${escapeHtml(payment.customerName)}</h3>
                <div class="badge-wrap">
                  <span class="badge ${statusClass}">${escapeHtml(payment.status)}</span>
                  <span class="badge">${payment.reviewed ? "Reviewed" : "Unreviewed"}</span>
                  <span class="badge gold">Method: ${escapeHtml(payment.method)}</span>
                  ${payment.instrumentLabel ? `<span class="badge green">${escapeHtml(payment.instrumentLabel)}</span>` : ""}
                </div>
              </div>
              <div class="badge-wrap">
                <span class="badge green">Amount: ${rupee(payment.amount)}</span>
              </div>
            </div>

            <div class="card-grid">
              <div class="mini">
                <div class="k">Order ID</div>
                <div class="v">${escapeHtml(payment.orderId || "-")}</div>
              </div>
              <div class="mini">
                <div class="k">Payment ID</div>
                <div class="v">${escapeHtml(payment.paymentId || "-")}</div>
              </div>
              <div class="mini">
                <div class="k">Email</div>
                <div class="v">${escapeHtml(payment.email || "-")}</div>
              </div>
              <div class="mini">
                <div class="k">Mobile</div>
                <div class="v">${escapeHtml(payment.mobile || "-")}</div>
              </div>
              <div class="mini">
                <div class="k">Date</div>
                <div class="v">${escapeHtml(payment.dateLabel || "-")}</div>
              </div>
              <div class="mini">
                <div class="k">Source</div>
                <div class="v">${escapeHtml(payment.sourceKey || "-")}</div>
              </div>
              <div class="mini">
                <div class="k">Refund Status</div>
                <div class="v">${escapeHtml(payment.refundStatus || "-")}</div>
              </div>
              <div class="mini">
                <div class="k">Razorpay Refund ID</div>
                <div class="v">${escapeHtml(payment.refundId || "-")}</div>
              </div>
              <div class="mini">
                <div class="k">Refund Amount</div>
                <div class="v">${payment.refundAmount ? rupee(payment.refundAmount) : "-"}</div>
              </div>
            </div>

            <div class="card-actions">
              <button
                class="${payment.reviewed ? 'btn-dark' : 'btn-secondary'}"
                onclick="toggleReviewed('${escapeHtml(payment.id)}','${escapeHtml(payment.orderId || "")}')"
              >
                ${payment.reviewed ? "Mark Unreviewed" : "Mark Reviewed"}
              </button>
            </div>
          </div>
        `;
      }).join("");
    }

    async function toggleReviewed(paymentId, orderId){
      const reviewMap = getReviewMap();
      const nextReviewed = !reviewMap[paymentId];
      if(!nextReviewed){
        delete reviewMap[paymentId];
      }
      await persistReviewedState(paymentId, nextReviewed, orderId);
      renderPayments();
    }

    function clearFilters(){
      document.getElementById("searchInput").value = "";
      document.getElementById("statusFilter").value = "all";
      document.getElementById("reviewFilter").value = "all";
      renderPayments();
    }

    function refreshPayments(){
      renderPayments();
    }

    window.addEventListener("focus", function(){
      renderPayments();
    });

    renderPayments();
  </script>
<script src="admin-nav-active.js"></script>

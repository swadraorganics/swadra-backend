<script>
(function(){
  const memoryStore = Object.create(null);

  function createMemoryStorage(){
    return {
      getItem(key){
        const name = String(key);
        return Object.prototype.hasOwnProperty.call(memoryStore, name) ? memoryStore[name] : null;
      },
      setItem(key, value){
        memoryStore[String(key)] = String(value);
      },
      removeItem(key){
        delete memoryStore[String(key)];
      },
      clear(){
        Object.keys(memoryStore).forEach(key=>delete memoryStore[key]);
      },
      key(index){
        const keys = Object.keys(memoryStore);
        return Number.isInteger(index) && index >= 0 && index < keys.length ? keys[index] : null;
      },
      get length(){
        return Object.keys(memoryStore).length;
      }
    };
  }

  const memoryStorage = createMemoryStorage();
  const disabledIndexedDb = {
    open(){
      const request = { result:null, error:new Error("indexedDB disabled on order page") };
      setTimeout(()=>{
        if(typeof request.onerror === "function"){
          request.onerror({ target: request });
        }
      }, 0);
      return request;
    },
    deleteDatabase(){
      const request = { result:null, error:new Error("indexedDB disabled on order page") };
      setTimeout(()=>{
        if(typeof request.onerror === "function"){
          request.onerror({ target: request });
        }
      }, 0);
      return request;
    }
  };

  try{
    Object.defineProperty(window, "localStorage", { value: memoryStorage, configurable: true });
  }catch(error){
    window.localStorage = memoryStorage;
  }

  try{
    Object.defineProperty(window, "sessionStorage", { value: memoryStorage, configurable: true });
  }catch(error){
    window.sessionStorage = memoryStorage;
  }

  try{
    Object.defineProperty(window, "indexedDB", { value: disabledIndexedDb, configurable: true });
  }catch(error){
    window.indexedDB = disabledIndexedDb;
  }

  window.__swadraOrderMemoryStorage = memoryStorage;
})();
</script>

<script>
function safe(v){ return v ? String(v) : ""; }
function money(value){ return "₹" + Math.round(Number(value) || 0).toLocaleString("en-IN"); }
function nowText(){ return new Date().toLocaleString("en-IN", { dateStyle:"medium", timeStyle:"short" }); }
const API_BASE = window.SWADRA_API_BASE || "";
function getCurrentUser(){ return localStorage.getItem("currentUser"); }
function getUsers(){ return JSON.parse(localStorage.getItem("users")) || {}; }
function saveUsers(users){ localStorage.setItem("users", JSON.stringify(users)); }
function normalizeStatus(status){ return String(status || "Confirmed").trim().toLowerCase(); }
function statusLabel(status){
  const value = normalizeStatus(status);
  if(value.includes("cancel")) return "Cancelled";
  if(value.includes("out")) return "Out for Delivery";
  if(value.includes("dispatch") || value.includes("ship")) return "Dispatched";
  if(value.includes("deliver")) return "Delivered";
  if(value.includes("pack")) return "Packed";
  if(value.includes("process")) return "Packed";
  return "Confirmed";
}

function migrateLegacyOrders(){
  let currentUser = getCurrentUser();
  let users = getUsers();

  if(!currentUser){ return; }

  if(!users[currentUser]){
    users[currentUser] = { cart: [], orders: [] };
  }

  let userOrders = users[currentUser].orders || [];
  let legacyOrders = JSON.parse(localStorage.getItem("orders")) || [];

  if(!legacyOrders.length){ return; }

  legacyOrders.forEach(oldOrder=>{
    let exists = userOrders.some(order => order.id === oldOrder.id);
    if(!exists){
      userOrders.push({
        id: oldOrder.id,
        payment: oldOrder.payment || "Paid",
        payment_id: oldOrder.payment_id || "Legacy Order",
        items: oldOrder.items || oldOrder.products || [],
        total: oldOrder.total || 0,
        status: oldOrder.status || "Confirmed",
        refundStatus: oldOrder.refundStatus || "",
        refundAmount: oldOrder.refundAmount || 0,
        refundDate: oldOrder.refundDate || "",
        refundMessage: oldOrder.refundMessage || "",
        shipping: oldOrder.shipping || {},
        date: oldOrder.date || ""
      });
    }
  });

  users[currentUser].orders = userOrders;
  saveUsers(users);
  localStorage.removeItem("orders");
}

function getStatusClass(status){
  let value = normalizeStatus(status);
  if(value.includes("cancel")) return "status-cancelled";
  if(value.includes("out")) return "status-out";
  if(value.includes("dispatch") || value.includes("ship")) return "status-dispatched";
  if(value.includes("delivered")) return "status-delivered";
  if(value.includes("process")) return "status-processing";
  return "status-confirmed";
}

function buildTimeline(status){
  let value = normalizeStatus(status);
  if(value.includes("cancel")){
    return `<div class="timeline cancelled"><div class="timeline-step active"><div class="timeline-dot"></div><span>Order Cancelled</span></div></div>`;
  }
  let labels = ["Confirmed","Packed","Dispatched","Out for Delivery","Delivered"];
  let current = statusLabel(status);
  let activeIndex = Math.max(0, labels.indexOf(current));
  if(current === "Confirmed") activeIndex = 0;

  return labels.map((label,index)=>{
    let active = index <= activeIndex ? "active" : "";
    let line = index < labels.length - 1 ? `<div class="timeline-line"></div>` : "";
    return `<div class="timeline-step ${active}"><div class="timeline-dot"></div><span>${label}</span></div>${line}`;
  }).join("");
}

function viewOrder(id){
  localStorage.setItem("currentOrderId", id);
  window.location.href = "trackorder.html";
}

function reorder(id){
  let currentUser = getCurrentUser();
  let users = getUsers();
  let orders = (users[currentUser] && users[currentUser].orders) || [];
  let selected = orders.find(order => order.id === id);
  if(!selected){ return; }

  const existingCart = Array.isArray(users[currentUser].cart) ? users[currentUser].cart : [];
  const mergedCart = [...existingCart];
  (selected.items || []).forEach(item=>{
    const available = item.availability !== "Out of Stock" && item.stock !== 0;
    if(!available) return;
    const existing = mergedCart.find(cartItem => String(cartItem.id || cartItem.name) === String(item.id || item.name));
    if(existing){
      existing.qty = Number(existing.qty || 0) + Number(item.qty || 1);
    }else{
      mergedCart.push({...item, qty:Number(item.qty || 1)});
    }
  });
  users[currentUser].cart = mergedCart;
  saveUsers(users);
  localStorage.setItem("cart", JSON.stringify(mergedCart));
  window.dispatchEvent(new Event("cartUpdated"));
  alert("Available items were merged into your cart.");
  window.location.href = "cart.html";
}

function isDispatchedStatus(status){
  let value = String(status || "").toLowerCase();
  return value.includes("dispatch") || value.includes("ship") || value.includes("out for delivery") || value.includes("out_for_delivery");
}

function isDeliveredStatus(status){
  return normalizeStatus(status).includes("delivered") || statusLabel(status) === "Delivered";
}

function isCancelledStatus(status){
  return String(status || "").toLowerCase().includes("cancel");
}

function getCancelState(order){
  if(isCancelledStatus(order.status)){
    return { disabled: true, className: "disabled-btn", label: "Cancelled", note: "This order has already been cancelled." };
  }

  if(isDeliveredStatus(order.status)){
    return { disabled: true, className: "disabled-btn", label: "Return / Support", note: "Delivered orders cannot be cancelled. You can request return, replacement, or support." };
  }

  if(isDispatchedStatus(order.status)){
    return { disabled: true, className: "disabled-btn", label: "Cancellation Closed", note: "This order is already dispatched. Cancellation is closed; use Help / Support for delivery changes." };
  }

  return { disabled: false, className: "danger-btn", label: "Cancel Order", note: "" };
}

function cancelOrder(id){
  let currentUser = getCurrentUser();
  let users = getUsers();
  let orders = (users[currentUser] && users[currentUser].orders) || [];
  let selected = orders.find(order => order.id === id);

  if(!selected){ return; }

  if(isDeliveredStatus(selected.status)){
    alert("Delivered orders cannot be cancelled. Please use Help / Support for return or replacement.");
    return;
  }

  if(isDispatchedStatus(selected.status)){
    alert("This order is already dispatched. Please contact support for delivery assistance.");
    return;
  }

  if(isCancelledStatus(selected.status)){
    alert("This order has already been cancelled.");
    return;
  }

  selected.status = "Cancelled";
  selected.payment = "Refund Initiated";
  selected.refundStatus = "Refund Initiated";
  selected.refundAmount = Math.round(Number(selected.total) || 0);
  selected.refundDate = nowText();
  selected.estimatedRefundDate = new Date(Date.now() + 5 * 24 * 60 * 60 * 1000).toLocaleDateString("en-IN", { dateStyle:"medium" });
  selected.refundId = selected.refundId || ("rfnd_" + Date.now());
  selected.refundMode = selected.refundMode || "Original payment method";
  selected.refundMessage = "Refund has been initiated. It will be processed to your original payment method after payment gateway confirmation.";
  selected.statusHistory = Array.isArray(selected.statusHistory) ? selected.statusHistory : [];
  selected.statusHistory.push({ status:"Cancelled", time:nowText(), note:"Cancellation accepted and refund initiated." });
  selected.updatedAt = new Date().toISOString();
  saveUsers(users);
  alert("Your order has been cancelled. Refund has been initiated.");
  loadOrders();
}

function orderMatchesFilter(order, filter){
  const value = normalizeStatus(order.status);
  if(filter === "delivered") return isDeliveredStatus(order.status) && !value.includes("cancel");
  if(filter === "cancelled") return value.includes("cancel");
  if(filter === "active") return !value.includes("deliver") && !value.includes("cancel");
  return true;
}

function orderMatchesSearch(order, query){
  const text = [
    order.id,
    order.payment_id,
    order.status,
    ...(order.items || []).map(item=>item.name)
  ].join(" ").toLowerCase();
  return text.includes(String(query || "").trim().toLowerCase());
}

function toggleOrderDetails(id){
  const panel = document.getElementById("details-" + id);
  if(panel) panel.classList.toggle("show");
}

function downloadInvoice(id){
  localStorage.setItem("currentOrderId", id);
  window.location.href = "invoice.html";
}

function requestSupport(id){
  localStorage.setItem("supportOrderId", id);
  alert("Support request noted for order " + id + ". Our team will contact you shortly.");
}

async function fetchBackendOrdersForUser(userId){
  try{
    const response = await fetch(`${API_BASE}/api/orders/user/${encodeURIComponent(userId)}`, { cache:"no-store" });
    const data = await response.json();
    if(!response.ok || !data.ok) throw new Error(data.error || "Backend orders unavailable");
    return Array.isArray(data.orders) ? data.orders : [];
  }catch(error){
    console.warn("Backend order fetch failed, using localStorage fallback", error);
    return null;
  }
}

function mergeOrders(localOrders, backendOrders){
  if(!Array.isArray(backendOrders)) return localOrders;
  const map = new Map();
  localOrders.forEach(order=>map.set(String(order.id), order));
  backendOrders.forEach(order=>map.set(String(order.id), { ...(map.get(String(order.id)) || {}), ...order }));
  return Array.from(map.values());
}

async function loadOrders(){
  const container = document.getElementById("ordersContainer");
  container.innerHTML = "";

  let currentUser = getCurrentUser();
  if(!currentUser){
    window.location.href = "account.html";
    return;
  }

  migrateLegacyOrders();

  let users = getUsers();
  if(!users[currentUser]){
    container.innerHTML = `<div class="empty"><h3>No account data found</h3><p>Please log in again to view your orders.</p></div>`;
    return;
  }

  let localOrders = users[currentUser].orders || [];
  let backendOrders = await fetchBackendOrdersForUser(currentUser);
  let orders = mergeOrders(localOrders, backendOrders);
  if(Array.isArray(backendOrders)){
    users[currentUser].orders = orders;
    saveUsers(users);
  }
  if(!orders.length){
    container.innerHTML = `
      <div class="empty">
        <h3>No orders yet</h3>
        <p>Your confirmed purchases will appear here after checkout.</p>
        <a class="primary-btn" href="index.html">Start Shopping</a>
      </div>
    `;
    return;
  }

  const query = document.getElementById("orderSearchInput")?.value || "";
  const filter = document.getElementById("orderStatusFilter")?.value || "all";
  const visibleOrders = orders.slice().reverse().filter(order=>orderMatchesFilter(order, filter) && orderMatchesSearch(order, query));

  if(!visibleOrders.length){
    container.innerHTML = `<div class="empty"><h3>No matching orders</h3><p>Try a different order ID, product name, or filter.</p></div>`;
    return;
  }

  visibleOrders.forEach(order=>{
    let cancelState = getCancelState(order);
    let itemCount = (order.items || []).reduce((sum,item)=>sum + Number(item.qty || 1), 0);
    let statusText = statusLabel(order.status);
    let itemsHtml = (order.items || []).map(item=>`
      <div class="item-row">
        <img class="item-thumb" src="${safe(item.image) || "images/logo.png"}" alt="${safe(item.name)}">
        <div>
          <div class="item-name">${safe(item.name)}</div>
          <div class="item-qty">Qty ${safe(item.qty)}</div>
        </div>
        <div class="item-price">${money(item.discountedUnitPrice || item.displayPrice || item.price)}</div>
        <div class="item-price">${Number(item.discountedLineTotal || item.displayLineTotal || 0) > 0 && Number(item.discountedLineTotal || item.displayLineTotal || 0) < (Number(item.price) || 0) * (Number(item.qty) || 0) ? `<span style="display:block;font-size:12px;color:#888;text-decoration:line-through;">${money((Number(item.price) || 0) * (Number(item.qty) || 0))}</span>` : ""}${money(item.discountedLineTotal || item.displayLineTotal || ((Number(item.price) || 0) * (Number(item.qty) || 0)))}</div>
      </div>
    `).join("");

    let shipping = order.shipping || {};
    let history = Array.isArray(order.statusHistory) && order.statusHistory.length ? order.statusHistory : [{ status: statusText, time: safe(order.date) || "Recently", note: "Order status updated." }];
    let historyHtml = history.map(entry=>`<div><strong>${safe(entry.status)}</strong> - ${safe(entry.time)}${entry.note ? `<br><span>${safe(entry.note)}</span>` : ""}</div>`).join("");
    let subtotal = Number(order.subtotal || order.items?.reduce((sum,item)=>sum + (Number(item.price) || 0) * (Number(item.qty) || 1), 0) || order.total || 0);
    let discount = Number(order.discount || order.couponDiscount || 0);
    let shippingFee = Number(order.shippingFee || order.deliveryFee || 0);
    let gst = Number(order.gst || 0);
    let card = document.createElement("div");
    card.className = "order-card";
    card.innerHTML = `
      <div class="order-head">
        <div>
          <div class="order-id">Order ${safe(order.id)}</div>
          <div class="order-meta">
            <span>Placed on ${safe(order.date) || "Recently"}</span>
            <span>Transaction ID: ${safe(order.payment_id) || "Not available"}</span>
            <span>Payment: ${safe(order.payment) || "Paid online"}</span>
            <span>${itemCount} ${itemCount === 1 ? "item" : "items"}${order.expectedDelivery ? ` • Expected by ${safe(order.expectedDelivery)}` : ""}</span>
          </div>
        </div>
        <span class="status-chip ${getStatusClass(order.status)}">${statusText}</span>
      </div>

      <div class="order-body">
        <div class="items-panel">
          <div class="panel-title">Items in this order</div>
          <div class="item-list">${itemsHtml}</div>
          <div class="timeline">${buildTimeline(order.status)}</div>
        </div>

        <div class="summary-panel">
          <div class="panel-title">Order summary</div>
          <div class="summary-grid">
            <div class="summary-line"><span>Subtotal</span><strong>${money(subtotal)}</strong></div>
            ${discount ? `<div class="summary-line"><span>Coupon discount</span><strong>-${money(discount)}</strong></div>` : ""}
            ${gst ? `<div class="summary-line"><span>GST</span><strong>${money(gst)}</strong></div>` : ""}
            <div class="summary-line"><span>Shipping</span><strong>${shippingFee ? money(shippingFee) : "Free"}</strong></div>
            <div class="summary-line"><span>Total paid</span><strong>${money(order.total)}</strong></div>
            <div class="summary-line"><span>Payment status</span><strong>${safe(order.payment) || "Paid"}</strong></div>
            <div class="summary-line"><span>Current status</span><strong>${statusText}</strong></div>
            ${order.trackingId ? `<div class="summary-line"><span>Tracking ID</span><strong>${safe(order.trackingId)}</strong></div>` : ""}
            ${order.courierName ? `<div class="summary-line"><span>Courier</span><strong>${safe(order.courierName)}</strong></div>` : ""}
            ${order.refundStatus ? `<div class="summary-line"><span>Refund status</span><strong>${safe(order.refundStatus)}</strong></div>` : ""}
            ${order.refundAmount ? `<div class="summary-line"><span>Refund amount</span><strong>${money(order.refundAmount)}</strong></div>` : ""}
            ${order.refundDate ? `<div class="summary-line"><span>Refund date</span><strong>${safe(order.refundDate)}</strong></div>` : ""}
          </div>
          <div class="address-box">
            <strong>Delivery address</strong><br>
            ${safe(shipping.name) || "Customer"}<br>
            ${safe(shipping.phone) || "No phone"}<br>
            ${safe(shipping.address) || "Address not available"}
          </div>
          ${order.refundMessage ? `<div class="refund-box"><strong>Refund update</strong><br>${safe(order.refundMessage)}${order.estimatedRefundDate ? `<br>Estimated refund date: ${safe(order.estimatedRefundDate)}` : ""}${order.refundId ? `<br>Refund ID: ${safe(order.refundId)}` : ""}${order.refundMode ? `<br>Mode: ${safe(order.refundMode)}` : ""}</div>` : ""}
          <div class="details-panel" id="details-${safe(order.id)}">
            <strong>Status history</strong><br>${historyHtml}
            <br><br><strong>Full address</strong><br>
            ${safe(shipping.house || shipping.address) || "Address not available"} ${safe(shipping.area)} ${safe(shipping.district)} ${safe(shipping.state)} ${safe(shipping.pincode)}
          </div>
          <div class="action-row">
            <button class="primary-btn" onclick="viewOrder('${safe(order.id)}')">Track Order</button>
            <button class="secondary-btn" onclick="reorder('${safe(order.id)}')">Buy Again</button>
            <button class="secondary-btn" onclick="toggleOrderDetails('${safe(order.id)}')">Order Details</button>
            <button class="secondary-btn" onclick="downloadInvoice('${safe(order.id)}')">Invoice</button>
            <button class="secondary-btn" onclick="requestSupport('${safe(order.id)}')">Help / Support</button>
            ${isDeliveredStatus(order.status) ? `<button class="secondary-btn" onclick="requestSupport('${safe(order.id)}')">Return / Replace</button><button class="secondary-btn" onclick="requestSupport('${safe(order.id)}')">Review Product</button>` : ""}
            <button class="secondary-btn ${cancelState.className}" onclick="cancelOrder('${safe(order.id)}')" ${cancelState.disabled ? "disabled" : ""}>${cancelState.label}</button>
          </div>
          ${cancelState.note ? `<div class="action-note">${cancelState.note}</div>` : ""}
        </div>
      </div>
    `;
    container.appendChild(card);
  });
}

window.addEventListener("load", loadOrders);
document.addEventListener("input", function(event){
  if(event.target && event.target.id === "orderSearchInput") loadOrders();
});
document.addEventListener("change", function(event){
  if(event.target && event.target.id === "orderStatusFilter") loadOrders();
});
document.addEventListener("keydown", function(event){
  const input = event.target;
  if(input && input.classList && input.classList.contains("header-search-input") && event.key === "Enter"){
    const query = input.value.trim();
    if(query){
      window.location.href = "index.html?search=" + encodeURIComponent(query);
    }
  }
});
</script>
<script>
function swadraHeaderGetCart(){
  try{return JSON.parse(localStorage.getItem("cart")) || [];}catch(e){return [];}
}
function swadraHeaderUpdateStickyCart(){
  let bar=document.getElementById("stickyCart");
  let count=document.getElementById("cartCount");
  if(!bar || !count) return;
  let cart=swadraHeaderGetCart();
  let totalItems=0,totalPrice=0;
  cart.forEach(item=>{ totalItems+=Number(item.qty||0); totalPrice+=Number(item.qty||0)*Number(item.price||0); });
  if(totalItems>0){
    bar.style.display="flex";
    count.innerText=totalItems+" item ₹"+totalPrice;
  }else{
    bar.style.display="none";
  }
}
function swadraHeaderUpdateAccountNav(){
  let slot=document.getElementById("accountNavSlot");
  if(!slot) return;
  let currentUser=localStorage.getItem("currentUser");
  let users={};
  try{ users=JSON.parse(localStorage.getItem("users")) || {}; }catch(e){}
  if(currentUser && users[currentUser]){
    slot.innerHTML='<a href="dashboard.html" style="color:#fff;text-decoration:none;font-weight:600;font-size:16px;font-family:Arial,sans-serif;">My Account</a>';
  }else{
    slot.innerHTML='<a href="account.html" style="color:#fff;text-decoration:none;font-weight:600;font-size:16px;font-family:Arial,sans-serif;">Signup/Login</a>';
  }
}
window.addEventListener("load", function(){ swadraHeaderUpdateStickyCart(); swadraHeaderUpdateAccountNav(); });
window.addEventListener("cartUpdated", swadraHeaderUpdateStickyCart);
window.addEventListener("storage", function(event){
  if(["cart","users","currentUser"].includes(event.key)){
    swadraHeaderUpdateStickyCart();
    swadraHeaderUpdateAccountNav();
  }
});
</script>

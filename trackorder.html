<meta name="description" content="Track Swadra Organics orders with order ID, shipment status, courier details and delivery progress.">
<style>

:root{
--top-bar-height:43px;
--navbar-height:62px;
--sale-bar-height:44px;
}

/* TOP BAR */
.top-bar{
text-align:center;
padding:12px;
font-size:16px;
font-weight:600;
color:#7a3d3d;
background:#fff;
position:sticky !important;
top:0;
z-index:7002;
margin:0 !important;
}

/* NAVBAR */
.navbar{
display:flex;
justify-content:space-between;
align-items:center;
padding:14px 24px;
background:#7a3d3d;
position:sticky;
top:calc(var(--top-bar-height) - 1px) !important;
z-index:7001;
color:#fff;
}

.logo{
display:block;
color:#fff;
font-size:26px;
font-weight:900;
white-space:nowrap;
font-family:Arial,sans-serif;
}

.logo a{
color:#fff;
text-decoration:none;
font:inherit;
}

.nav-search{
position:absolute;
left:50%;
top:50%;
transform:translate(-50%,-50%);
flex:0 0 300px;
max-width:300px;
width:300px;
margin:0;
z-index:2;
}

.nav-search input{
width:100%;
height:38px;
border:none;
outline:none;
border-radius:8px;
padding:0 14px 0 40px;
background:#f5f5f6;
color:#282c3f;
font-size:13px;
font-weight:500;
box-sizing:border-box;
text-overflow:ellipsis;
}

.nav-search::before{
content:"";
position:absolute;
left:16px;
top:50%;
width:14px;
height:14px;
border:2px solid #696e79;
border-radius:50%;
transform:translateY(-60%);
opacity:.85;
}

.nav-search::after{
content:"";
position:absolute;
left:28px;
top:21px;
width:7px;
height:2px;
background:#696e79;
transform:rotate(45deg);
border-radius:2px;
opacity:.85;
}

.nav-search-results{
position:absolute;
top:calc(100% + 10px);
left:0;
width:100%;
background:#ffffff;
border-radius:14px;
box-shadow:0 18px 45px rgba(0,0,0,0.15);
border:1px solid #ececec;
display:none;
max-height:320px;
overflow:auto;
overflow-x:hidden;
z-index:5000;
}

.nav-links{
display:flex;
gap:18px;
align-items:center;
justify-content:flex-end;
flex-wrap:wrap;
}

.navbar a{
color:#fff;
text-decoration:none;
font-weight:700;
font-size:16px;
margin-left:0;
font-family:Arial,sans-serif;
}

.sale-bar{
display:block;
position:sticky !important;
top:calc(var(--top-bar-height) + var(--navbar-height) - 1px) !important;
z-index:7000;
overflow:hidden;
white-space:nowrap;
min-height:44px;
padding:10px 0;
background:#ffffff;
color:#7a3d3d;
font-size:16px;
font-weight:700;
line-height:20px;
border-top:1px solid rgba(198,40,40,0.12);
border-bottom:1px solid rgba(198,40,40,0.18);
font-family:Arial,sans-serif;
}

.sale-bar-track{
display:flex;
align-items:center;
width:max-content;
min-width:max-content;
min-height:44px;
padding-left:0;
animation:offerTicker 52s linear infinite;
will-change:transform;
}

.sale-bar-item{
display:inline-flex;
align-items:center;
flex:0 0 auto;
margin-right:84px;
}

@keyframes offerTicker{
from{transform:translateX(0)}
to{transform:translateX(-100%)}
}

/* MAIN */
.container{
max-width:700px;
margin:40px auto;
background:#fff;
padding:25px;
border-radius:10px;
box-shadow:0 0 10px rgba(0,0,0,0.1);
}

/* INPUT */
.input-row{
display:flex;
gap:10px;
flex-wrap:wrap;
}

input{
flex:1;
padding:10px;
border:1px solid #ccc;
border-radius:5px;
min-width:240px;
}

button{
padding:10px 15px;
background:#7a3d3d;
color:#fff;
border:none;
border-radius:5px;
cursor:pointer;
}

/* STATUS BAR */
.progress{
display:flex;
justify-content:space-between;
margin-top:30px;
position:relative;
}

.progress::before{
content:"";
position:absolute;
top:15px;
left:0;
width:100%;
height:4px;
background:#ddd;
z-index:0;
}

.step{
text-align:center;
z-index:1;
width:16%;
}

.circle{
width:30px;
height:30px;
border-radius:50%;
background:#ddd;
margin:auto;
line-height:30px;
color:#fff;
font-size:14px;
}

.active .circle{
background:#7a3d3d;
}

.label{
font-size:12px;
margin-top:5px;
}

.info{
margin-top:25px;
background:#fafafa;
padding:18px;
border-radius:10px;
line-height:1.8;
}

.live-box{
margin-top:20px;
background:#f7fbff;
border:1px solid #dcecff;
padding:18px;
border-radius:10px;
line-height:1.8;
color:#24425f;
}

.live-box h3{margin-bottom:8px;color:#17324d}
.live-box .muted{color:#6b7a8a;font-size:13px}

.items-box{
margin-top:20px;
background:#fafafa;
padding:18px;
border-radius:10px;
}

.items-box div{
padding:6px 0;
border-bottom:1px solid #eee;
}

.empty{
margin-top:20px;
padding:20px;
background:#fafafa;
border-radius:10px;
text-align:center;
}

@media(max-width:1180px){
.navbar{flex-wrap:wrap;gap:12px}
.nav-search{position:relative;left:auto;top:auto;transform:none;order:3;flex:1 1 100%;max-width:none;margin:4px 0 0;width:auto}
}
</style>

<style>html,body{background:#f1e3e3 !important;}</style>
<link rel="stylesheet" href="swadra-responsive.css">
<link rel="stylesheet" href="mobile.css">

<script src="https://www.gstatic.com/firebasejs/10.12.2/firebase-firestore-compat.js"></script>
<script src="https://www.gstatic.com/firebasejs/10.12.2/firebase-auth-compat.js"></script>

<body>

<div class="top-bar">
Eat Healthy â€¢ Be Swadra Family
</div>

<div class="navbar">
<div class="logo"><a href="index.html">Swadra Organics</a></div>
<div class="nav-search"><input type="search" class="header-search-input" placeholder="Search for products, categories and more"><div id="searchResults" class="nav-search-results"></div></div>
<div class="nav-links">
<a href="index.html">Home</a>
<a href="spices.html">Spices</a>
<a href="dryfruits.html">Dry Fruits</a>
<a href="oilghee.html">Oil Ghee &amp; More</a>

<a href="cart.html">Cart</a>

</div>
</div>

<div class="sale-bar"><div class="sale-bar-track" id="saleBarTrack"></div></div>

<div class="container">

<h2>Track Your Order</h2>

<div class="input-row">
<input id="orderId" placeholder="Enter Order ID">
<button onclick="trackOrder()">Track</button>
</div>

<div id="result"></div>

</div>

<script>

/* =====================================================
   HELPERS
===================================================== */
const authApi = window.SWADRA_AUTH || null;
const dataApi = window.SWADRA_DATA || null;
function getCurrentUser(){
  return authApi && typeof authApi.getCurrentUserEmail === "function" ? authApi.getCurrentUserEmail() : "";
}

function getUsers(){
  return authApi && typeof authApi.getUsers === "function" ? authApi.getUsers() : {};
}

function safe(v){
  return v ? v : "";
}

function money(value){
  return "₹" + Math.round(Number(value) || 0).toLocaleString("en-IN");
}

const API_BASE = window.SWADRA_API_BASE || "";

async function renderOfferBar(forceRefresh){
  if(window.SWADRA_OFFERS && typeof window.SWADRA_OFFERS.renderSaleBar === "function"){
    await window.SWADRA_OFFERS.renderSaleBar("saleBarTrack", !!forceRefresh);
  }
}

/* =====================================================
   AUTO LOAD LAST ORDER
===================================================== */
window.onload = function(){
  renderOfferBar(true);
  let last = new URLSearchParams(window.location.search).get("orderId");

  if(last){
    document.getElementById("orderId").value = last;
    trackOrder();
  }
};

/* =====================================================
   FIND ORDER FROM USER HISTORY
===================================================== */
function findUserOrder(id){

  let currentUser = getCurrentUser();

  if(!currentUser){
    return null;
  }

  let users = getUsers();

  let userOrders =
    users[currentUser]?.orders || [];

  let found =
    userOrders.find(o => o.id === id);

  if(found){
    return found;
  }
  return null;
}

function persistOrderUpdate(order){
  if(!order || !order.id) return;
  const currentUser = getCurrentUser();
  if(!currentUser) return;
  const users = getUsers();
  users[currentUser] = users[currentUser] || { cart: [], orders: [] };
  const existingOrders = Array.isArray(users[currentUser].orders) ? users[currentUser].orders : [];
  const orderIndex = existingOrders.findIndex(item => String(item.id) === String(order.id));
  if(orderIndex > -1){
    existingOrders[orderIndex] = { ...existingOrders[orderIndex], ...order };
  }else{
    existingOrders.push(order);
  }
  users[currentUser].orders = existingOrders;
  if(authApi && typeof authApi.saveUsers === "function"){
    authApi.saveUsers(users);
  }
}

function buildOrderAccessQuery(){
  const currentUser = getCurrentUser();
  return currentUser ? "?userId=" + encodeURIComponent(currentUser) + "&email=" + encodeURIComponent(currentUser) : "";
}

async function fetchBackendOrder(id){
  if(dataApi && typeof dataApi.fetchOrder === "function"){
    try{
      const order = await dataApi.fetchOrder(id);
      if(order && order.id) return order;
    }catch(error){}
  }
  try{
    const response = await fetch(`${API_BASE}/api/orders/${encodeURIComponent(id)}${buildOrderAccessQuery()}`, { cache:"no-store" });
    const data = await response.json();
    if(!response.ok || !data.ok) throw new Error(data.error || "Order not found");
    return data.order;
  }catch(error){
    return null;
  }
}

/* =====================================================
   TRACK ORDER
===================================================== */
function normalizeAdminOrderStatus(status){
  const value = String(status || "").trim().toLowerCase();
  if(value.includes("cancel")) return "cancelled";
  if(value.includes("deliver")) return "delivered";
  if(value.includes("out")) return "out_for_delivery";
  if(value.includes("dispatch") || value.includes("ship")) return "dispatched";
  if(value.includes("pack") || value.includes("process")) return "packed";
  return "confirmed";
}

function getOrderItemSizeLabel(item){
  return String(
    item?.size ||
    item?.productSize ||
    item?.selectedSize ||
    item?.variant ||
    item?.weight ||
    item?.packSize ||
    item?.unit ||
    ""
  ).trim();
}

async function trackOrder(){

  let id =
    document.getElementById("orderId").value.trim();

  let backendOrder = await fetchBackendOrder(id);
  if(backendOrder){
    persistOrderUpdate(backendOrder);
  }
  let order = backendOrder || findUserOrder(id);

  if(!order){
    document.getElementById("result").innerHTML = `
      <div class="empty">
        <h3>Order not found</h3>
        <p>Please check your Order ID.</p>
      </div>
    `;
    return;
  }

  let steps = [
    "confirmed",
    "packed",
    "dispatched",
    "out_for_delivery",
    "delivered"
  ];

  let labels = [
    "Confirmed",
    "Packed",
    "Dispatched",
    "Out for Delivery",
    "Delivered"
  ];

  let normalizedStatus = normalizeAdminOrderStatus(order.status || order.orderStatus || order.deliveryStatus);
  let currentIndex = Math.max(0, steps.indexOf(normalizedStatus));

  if(normalizedStatus === "cancelled"){
    document.getElementById("result").innerHTML = `
      <h3>Order ID: ${safe(order.id)}</h3>
      <div class="empty">
        <h3>Order Cancelled</h3>
        <p>This order has been cancelled and will not be dispatched.</p>
        ${order.refundStatus ? `<p><b>Refund Status:</b> ${safe(order.refundStatus)}</p>` : ""}
        ${order.refundAmount ? `<p><b>Refund Amount:</b> ₹${safe(order.refundAmount)}</p>` : ""}
        ${order.refundDate ? `<p><b>Refund Date:</b> ${safe(order.refundDate)}</p>` : ""}
        ${order.refundMessage ? `<p>${safe(order.refundMessage)}</p>` : ""}
      </div>
      <div class="items-box">
        <h3>Ordered Items</h3>
        ${(order.items || order.products || []).map(item=>{
          const size = getOrderItemSizeLabel(item);
          return `<div>${safe(item.name)}${size ? ` (${safe(size)})` : ""} x ${safe(item.qty || item.quantity || 1)}</div>`;
        }).join("")}
      </div>
    `;
    return;
  }

  /* BUILD UI */
  let html = `
    <h3>Order ID: ${safe(order.id)}</h3>
    <p><b>Status:</b> ${labels[currentIndex]}</p>
    ${order.awb || order.trackingId || order.awbCode ? `<p><b>Tracking ID:</b> ${safe(order.awb || order.trackingId || order.awbCode)}</p>` : ""}
    ${order.courierName ? `<p><b>Courier:</b> ${safe(order.courierName)}</p>` : ""}

    <div class="progress">
  `;

  steps.forEach((step,i)=>{

    let active =
      i <= currentIndex ? "active" : "";

    html += `
      <div class="step ${active}">
        <div class="circle">${i+1}</div>
        <div class="label">${labels[i]}</div>
      </div>
    `;
  });

  html += `</div>`;

  /* items */
  html += `
    <div class="items-box">
      <h3>Ordered Items</h3>
  `;

  (order.items || order.products || []).forEach(item=>{
    const size = getOrderItemSizeLabel(item);
    html += `
      <div>
        ${safe(item.name)}${size ? ` (${safe(size)})` : ""} x ${safe(item.qty || item.quantity || 1)}
      </div>
    `;
  });

  html += `</div>`;

  /* shipping */
  let shipping = order.shipping || {};

  html += `
    <div class="info">
      <p><b>Transaction ID:</b> ${safe(order.payment_id)}</p>
      <p><b>Total Paid:</b> ₹${safe(order.total || order.finalAmount || order.amount)}</p>
      <p><b>Date:</b> ${safe(order.date)}</p>
      <p><b>Name:</b> ${safe(shipping.name)}</p>
      <p><b>Phone:</b> ${safe(shipping.phone)}</p>
      <p><b>Address:</b>
        ${safe(shipping.house)}
        ${safe(shipping.area)}
        ${safe(shipping.city || shipping.district)}
        ${safe(shipping.state)}
        ${safe(shipping.pincode)}
      </p>
    </div>
  `;

  document.getElementById("result").innerHTML = html;
  await loadShiprocketTracking(order);
}

function pickShiprocketShipment(data){
  const root = data?.shiprocket || data || {};
  if(Array.isArray(root.tracking_data?.shipment_track)) return root.tracking_data.shipment_track[0] || {};
  if(Array.isArray(root.tracking_data?.shipment_track_activities)) return { activities: root.tracking_data.shipment_track_activities };
  if(Array.isArray(root.shipment_track)) return root.shipment_track[0] || {};
  if(Array.isArray(root.data?.shipment_track)) return root.data.shipment_track[0] || {};
  return root.tracking_data || root.data || root;
}

function pickShiprocketActivities(data){
  const root = data?.shiprocket || data || {};
  return root.tracking_data?.shipment_track_activities
    || root.data?.shipment_track_activities
    || root.shipment_track_activities
    || pickShiprocketShipment(data).activities
    || [];
}

async function loadShiprocketTracking(order){
  const awb = String(order.trackingId || order.awb || order.awbCode || "").trim();
  const result = document.getElementById("result");
  if(!result) return;

  if(!awb){
    result.insertAdjacentHTML("beforeend", `<div class="live-box"><h3>Live Courier Tracking</h3><p class="muted">AWB / tracking ID is not added to this order yet. Add Shiprocket AWB in the order record to enable auto tracking.</p></div>`);
    return;
  }

  result.insertAdjacentHTML("beforeend", `<div class="live-box" id="shiprocketLiveBox"><h3>Live Courier Tracking</h3><p class="muted">Fetching Shiprocket tracking...</p></div>`);

  try{
    const response = await fetch(`${API_BASE}/api/shiprocket/track/${encodeURIComponent(awb)}`);
    const data = await response.json();
    const box = document.getElementById("shiprocketLiveBox");
    if(!box) return;

    if(!response.ok || !data.ok){
      box.innerHTML = `<h3>Live Courier Tracking</h3><p>${safe(data.error) || "Tracking is not available right now."}</p><p class="muted">AWB: ${safe(awb)}</p>`;
      return;
    }

    const shipment = pickShiprocketShipment(data);
    const activities = pickShiprocketActivities(data).slice(0, 5);
    const status = shipment.current_status || shipment.shipment_status || shipment.status || "Tracking updated";
    const normalizedLiveStatus = normalizeAdminOrderStatus(status);
    const courier = shipment.courier_name || shipment.courier || order.courierName || "Shiprocket";
    const eta = shipment.edd || shipment.expected_delivery_date || shipment.estimated_delivery_date || "";
    persistOrderUpdate({
      ...order,
      status: normalizedLiveStatus,
      shiprocketStatus: status,
      courierName: courier,
      trackingId: awb,
      awb,
      shipment_id: shipment.shipment_id || shipment.shipmentId || order.shipment_id || "",
      expectedDelivery: eta,
      trackingActivities: activities,
      trackingUpdatedAt: new Date().toISOString()
    });
    const activityHtml = activities.length ? activities.map(item=>`
      <div style="border-top:1px solid #dcecff;padding-top:8px;margin-top:8px;">
        <strong>${safe(item.activity || item.status || item.remark || "Update")}</strong><br>
        <span class="muted">${safe(item.date || item.datetime || item.scan_date)} ${safe(item.location)}</span>
      </div>
    `).join("") : `<p class="muted">No activity log received yet.</p>`;

    box.innerHTML = `
      <h3>Live Courier Tracking</h3>
      <p><b>Status:</b> ${safe(status)}</p>
      <p><b>Courier:</b> ${safe(courier)}</p>
      <p><b>AWB:</b> ${safe(awb)}</p>
      ${eta ? `<p><b>Expected delivery:</b> ${safe(eta)}</p>` : ""}
      ${activityHtml}
    `;
  }catch(error){
    const box = document.getElementById("shiprocketLiveBox");
    if(box){
      box.innerHTML = `<h3>Live Courier Tracking</h3><p>Backend server is offline or Shiprocket could not be reached.</p><p class="muted">${safe(error.message)}</p>`;
    }
  }
}

</script>

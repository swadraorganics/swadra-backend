function getProductSummary(product){ return String(product?.summary || product?.productSummary || "").trim(); }
function escapeAttr(value){ return String(value ?? "").replace(/&/g,"&amp;").replace(/"/g,"&quot;").replace(/</g,"&lt;").replace(/>/g,"&gt;"); }
function buildGalleryMarkup(product,id){ const images=getProductImages(product); const primary=images[0] || 'https://via.placeholder.com/300'; if(images.length<=1){ return `<img id="product-img-${id}" class="product-summary-trigger" src="${primary}" onclick="openProductSummary('${id}')">`; } return `<button type="button" class="gallery-nav gallery-prev" onclick="changeProductImage('${id}',-1)">&#10094;</button><img id="product-img-${id}" class="product-summary-trigger" src="${primary}" onclick="openProductSummary('${id}')"><button type="button" class="gallery-nav gallery-next" onclick="changeProductImage('${id}',1)">&#10095;</button><div class="gallery-dots">${images.map((img,index)=>`<span class="gallery-dot ${index===0?'active':''}" onclick="setProductImage('${id}',${index})"></span>`).join("")}</div>`; }
function setProductImage(id,index){ const card=document.querySelector(`[data-gallery-id="${id}"]`); if(!card) return; const images=JSON.parse(card.dataset.images || "[]"); const img=document.getElementById(`product-img-${id}`); if(!img || !images[index]) return; img.src=images[index]; card.dataset.currentImage=index; card.querySelectorAll(".gallery-dot").forEach((dot,dotIndex)=>dot.classList.toggle("active", dotIndex===index)); }
function changeProductImage(id,step){ const card=document.querySelector(`[data-gallery-id="${id}"]`); if(!card) return; const images=JSON.parse(card.dataset.images || "[]"); if(images.length<2) return; const current=Number(card.dataset.currentImage || 0); const next=(current + step + images.length) % images.length; setProductImage(id,next); }
function openProductSummary(id){ const card=document.querySelector(`[data-gallery-id="${id}"]`); const modal=document.getElementById("productSummaryModal"); if(!card || !modal) return; document.getElementById("productSummaryTitle").textContent=card.dataset.productName || "Product Summary"; document.getElementById("productSummaryMeta").textContent=card.dataset.productSize || ""; document.getElementById("productSummaryBody").textContent=(card.dataset.productSummary || "").trim() || "Summary not available for this product yet."; modal.classList.add("show"); document.body.style.overflow="hidden"; }
function closeProductSummary(event){ if(event && event.target && event.target.id!=="productSummaryModal") return; const modal=document.getElementById("productSummaryModal"); if(!modal) return; modal.classList.remove("show"); document.body.style.overflow=""; }
function getHomeContent(){ return siteContentState.homeContent || {}; }
function getHomeArray(key){ const content=getHomeContent(); if(Array.isArray(content[key])) return content[key]; return Array.isArray(siteContentState[key]) ? siteContentState[key] : []; }
async function renderOfferBar(forceRefresh){ if(window.SWADRA_OFFERS && typeof window.SWADRA_OFFERS.renderSaleBar === "function"){ await window.SWADRA_OFFERS.renderSaleBar("saleBarTrack", !!forceRefresh); return; } const track=document.getElementById("saleBarTrack"); if(track) track.innerHTML=""; }
async function getProducts(forceRefresh){ if(!forceRefresh && productsCache && Date.now() - productsCacheLoadedAt < 120000){ return productsCache; } try{ productsCache=typeof productDataApi.fetchProducts === "function" ? (await productDataApi.fetchProducts()).map(normalizeBackendProduct) : []; productsCacheLoadedAt=Date.now(); return productsCache; }catch(error){ console.error("dryfruits products fetch failed", error); } productsCache=[]; productsCacheLoadedAt=Date.now(); return productsCache; }
async function loadSiteContent(){ if(!siteContentApi || typeof siteContentApi.fetch !== "function") return siteContentState; try{ siteContentState = await siteContentApi.fetch(true); }catch(error){ console.error("dryfruits site content fetch failed", error); } return siteContentState; }
function getProductPricing(product){ let mrp=Number(product.mrp || product.price || 0); let price=Number(product.price || 0); let offPercent=mrp>price && mrp>0 ? Math.round(((mrp-price)/mrp)*100) : 0; return {mrp,price,offPercent}; }
function getPerHundredPriceMarkup(product, sellingPrice){ const sizeText=String(product?.size || product?.productSize || "").trim().toLowerCase(); const price=Number(sellingPrice || product?.price || product?.sellingPrice || 0) || 0; if(!sizeText || !(price>0)) return ""; const match=sizeText.match(/(\d+(?:\.\d+)?)\s*(kg|g|gm|gram|grams|ml|l|ltr|litre|liter)/i); if(!match) return ""; const quantity=Number(match[1]); const unit=String(match[2] || "").toLowerCase(); if(!(quantity>0)) return ""; let baseAmount=0; let label=""; if(["g","gm","gram","grams"].includes(unit)){ baseAmount=quantity; label="100gm"; }else if(unit==="kg"){ baseAmount=quantity*1000; label="100gm"; }else if(unit==="ml"){ baseAmount=quantity; label="100ml"; }else if(["l","ltr","litre","liter"].includes(unit)){ baseAmount=quantity*1000; label="100ml"; } if(!(baseAmount>0) || !label) return ""; const perHundred=(price/baseAmount)*100; if(!(perHundred>0)) return ""; const rounded=Math.round(perHundred*100)/100; const formatted=Number.isInteger(rounded) ? rounded.toLocaleString() : rounded.toFixed(2); return `<span class="unit-price-note">₹${formatted}/${label}</span>`; }
function buildPriceMarkup(product){ let pricing=getProductPricing(product); const perHundredMarkup=getPerHundredPriceMarkup(product, pricing.price); if(pricing.offPercent>0){ return `<div class="price-stack"><div class="price-line"><span class="old-price">&#8377;${pricing.mrp}</span><div class="price">&#8377;${pricing.price}</div></div><div class="discount-badge">${pricing.offPercent}% OFF${perHundredMarkup}</div></div>`; } return perHundredMarkup ? `<div class="price-stack"><div class="price">&#8377;${pricing.price}</div><div class="discount-badge">${perHundredMarkup}</div></div>` : `<div class="price">&#8377;${pricing.price}</div>`; }
async function loadProducts(){ let products=await getProducts(); let cart=await getCart(); let filtered=products.filter(p=>productMatchesCategory(p,"dryfruits")); let html=""; filtered.forEach(p=>{ let id=String(p.id); let existing=cart.find(i=>String(i.id)===id); let isOut=p.availability==="Out of Stock" || p.outOfStock===true; html+=`<div class="product-card" data-gallery-id="${id}" data-current-image="0" data-images='${JSON.stringify(getProductImages(p))}' data-product-name="${escapeAttr(p.name)}" data-product-size="${escapeAttr(p.size || "100gm")}" data-product-summary="${escapeAttr(getProductSummary(p))}"><div class="product-img">${buildGalleryMarkup(p,id)}</div><div class="product-info"><div class="product-title-row"><h3>${p.name}</h3><div class="size">${p.size || "100gm"}</div></div><a class="detail-link" href="product-detail.html?id=${encodeURIComponent(id)}">View details, reviews & FAQ</a><div class="product-bottom"><div class="left">${isOut ? `<div class="out-stock-text">Out Of Stock</div>` : `${buildPriceMarkup(p)}`}</div><button class="cart-btn ${existing?'added':''} ${isOut?'disabled':''}" onclick="${isOut?'':'toggleCart(\''+id+'\')'}" ${isOut?"disabled":""}>${existing?"ADDED ✓":"ADD TO CART"}</button></div></div></div>`; }); document.getElementById("productsContainer").innerHTML=html; }
async function toggleCart(id){ let cart=await getCart(); let products=await getProducts(); let item=products.find(p=>String(p.id)===String(id)); if(!item) return; let qty=1; let existingIndex=cart.findIndex(i=>String(i.id)===String(id)); if(existingIndex>-1){ cart.splice(existingIndex,1); }else{ cart.push({id:String(item.id),name:item.name,price:Number(item.price)||0,mrp:Number(item.mrp || item.price)||0,image:getSafeCartImage(item.image),images:getProductImages(item),qty:qty}); } const saved = await saveCart(cart); if(saved===false) return; loadProducts(); }
function changeQty(id,val){}
async function updateCartUI(){ let cart=await getCart(); let totalItems=0,totalPrice=0; cart.forEach(i=>{ totalItems+=i.qty; totalPrice+=i.qty*i.price; }); let bar=document.getElementById("stickyCart"); if(totalItems>0){ bar.style.display="flex"; document.getElementById("cartCount").innerText=totalItems+" item ₹"+totalPrice; }else{ bar.style.display="none"; } }
function swadraHeaderAccountMenu(userLabel, userEmail){ return `<span class="account-menu-wrap"><a class="account-link" href="${userEmail ? "dashboard.html" : "account.html"}" aria-label="Account"><svg viewBox="0 0 24 24"><path d="M12 12a4 4 0 1 0-4-4 4 4 0 0 0 4 4Z"></path><path d="M4.5 20a7.5 7.5 0 0 1 15 0"></path></svg></a><div class="account-hover-menu"><div class="account-hover-head"><div class="account-hover-title">${userLabel}</div><div class="account-hover-copy">${userEmail || "Access your account, orders and saved details from one place."}</div>${userEmail ? `<a class="account-hover-cta" href="#" onclick="return swadraLogout(event)" style="color:#fff !important">LOGOUT</a>` : `<a class="account-hover-cta" href="account.html" style="color:#fff !important">LOGIN / SIGNUP</a>`}</div><ul class="account-hover-list"><li><a href="order.html"><span class="account-menu-icon" aria-hidden="true"><svg viewBox="0 0 24 24"><path d="M3 7.5 12 4l9 3.5"></path><path d="M5 9v8.5A1.5 1.5 0 0 0 6.5 19h11a1.5 1.5 0 0 0 1.5-1.5V9"></path><path d="M9 12h6"></path><path d="M9 15h4"></path></svg></span><span>Orders</span></a></li><li><a href="dashboard.html"><span class="account-menu-icon" aria-hidden="true"><svg viewBox="0 0 24 24"><path d="M4 19h16"></path><path d="M7 16V9"></path><path d="M12 16V5"></path><path d="M17 16v-3"></path></svg></span><span>Product Summary</span></a></li><li><a href="cart.html"><span class="account-menu-icon" aria-hidden="true"><svg viewBox="0 0 24 24"><circle cx="9" cy="19" r="1.4"></circle><circle cx="17" cy="19" r="1.4"></circle><path d="M3 5h2l2.1 9.1a1 1 0 0 0 1 .8h8.9a1 1 0 0 0 1-.8L20 8H7"></path></svg></span><span>Cart</span></a></li><li><a href="aboutus.html#contact"><span class="account-menu-icon" aria-hidden="true"><svg viewBox="0 0 24 24"><path d="M4 6.5A2.5 2.5 0 0 1 6.5 4h11A2.5 2.5 0 0 1 20 6.5v11a2.5 2.5 0 0 1-2.5 2.5h-11A2.5 2.5 0 0 1 4 17.5Z"></path><path d="m6 8 6 5 6-5"></path></svg></span><span>Contact Us</span></a></li></ul><ul class="account-hover-list"><li><a href="account.html#coupons"><span class="account-menu-icon" aria-hidden="true"><svg viewBox="0 0 24 24"><path d="M4 8.5A2.5 2.5 0 0 1 6.5 6h11A2.5 2.5 0 0 1 20 8.5v2a2 2 0 0 0 0 4v1A2.5 2.5 0 0 1 17.5 18h-11A2.5 2.5 0 0 1 4 15.5v-1a2 2 0 0 0 0-4Z"></path><path d="M9 9h.01"></path><path d="m15.5 9-6.5 6"></path><path d="M15 15h.01"></path></svg></span><span>Coupons</span></a></li><li><a href="account.html#saved-address"><span class="account-menu-icon" aria-hidden="true"><svg viewBox="0 0 24 24"><path d="M12 21s6-4.6 6-10a6 6 0 1 0-12 0c0 5.4 6 10 6 10Z"></path><circle cx="12" cy="11" r="2.3"></circle></svg></span><span>Saved Address</span></a></li></ul></div></span>`; }
function swadraLogout(event){ if(event) event.preventDefault(); runtimeDryfruitsCartCache = []; if(authApi && typeof authApi.signOutUser === "function"){ authApi.signOutUser({ keepCart:false }); } updateAccountNavigation(); updateCartUI(); window.location.href="index.html"; return false; }
function updateAccountNavigation(){ const slot=document.getElementById("accountNavSlot"); if(!slot) return; const user=getCurrentUser(); const users=getUsers(); const mobileAuthLink=document.getElementById("mobileDryfruitsAuthLink"); if(mobileAuthLink){ if(user && users[user]){ mobileAuthLink.textContent="Logout"; mobileAuthLink.setAttribute("href","#"); mobileAuthLink.onclick=function(event){ event.preventDefault(); return swadraLogout(event); }; }else{ mobileAuthLink.textContent="Login"; mobileAuthLink.setAttribute("href","account.html"); mobileAuthLink.onclick=null; } } if(user && users[user]){ slot.innerHTML=swadraHeaderAccountMenu((((users[user]||{}).profile||{}).name || user.split("@")[0]), user); }else{ slot.innerHTML=swadraHeaderAccountMenu("Welcome", ""); } }
const headerSearchInput=document.getElementById("searchInput");
const headerSearchResults=document.getElementById("searchResults");
let headerSearchCache=[];
function normalizeHeaderSearchText(value){ return String(value || "").toLowerCase().trim(); }
async function ensureHeaderSearchCache(){ if(headerSearchCache.length) return headerSearchCache; headerSearchCache=await getProducts(); return headerSearchCache; }
function renderHeaderSearchResults(items){ if(!headerSearchResults) return; if(!items.length){ headerSearchResults.innerHTML='<div class="nav-search-item"><div class="nav-search-copy"><strong>No product found</strong><span>Try another keyword</span></div></div>'; headerSearchResults.classList.add("show"); return; } headerSearchResults.innerHTML=items.slice(0,8).map(item=>`<div class="nav-search-item" data-search-query="${String(item.name || "").replace(/"/g,"&quot;")}"><div class="nav-search-item-media"><img src="${item.image || "https://via.placeholder.com/80"}" alt="${item.name || "Product"}"><div class="nav-search-copy"><strong>${item.name || "Swadra Product"}</strong><span>${item.category || "Product"}${item.size ? " • " + item.size : ""}</span></div></div><button type="button">View</button></div>`).join(""); headerSearchResults.classList.add("show"); headerSearchResults.querySelectorAll(".nav-search-item[data-search-query]").forEach(row=>{ row.addEventListener("click", function(){ const query=this.getAttribute("data-search-query") || ""; if(!query) return; window.location.href="index.html?search=" + encodeURIComponent(query); }); }); }
if(headerSearchInput && headerSearchResults){ headerSearchInput.addEventListener("input", async function(){ const query=normalizeHeaderSearchText(this.value); if(!query){ headerSearchResults.classList.remove("show"); headerSearchResults.innerHTML=""; return; } const products=await ensureHeaderSearchCache(); const filtered=products.filter(item=>normalizeHeaderSearchText(`${item.name} ${item.category} ${item.size}`).includes(query)); renderHeaderSearchResults(filtered); }); headerSearchInput.addEventListener("focus", async function(){ if(!normalizeHeaderSearchText(this.value)) return; const products=await ensureHeaderSearchCache(); const filtered=products.filter(item=>normalizeHeaderSearchText(`${item.name} ${item.category} ${item.size}`).includes(normalizeHeaderSearchText(headerSearchInput.value))); renderHeaderSearchResults(filtered); }); headerSearchInput.addEventListener("keydown", e=>{ if(e.key!=="Enter") return; const query=headerSearchInput.value.trim(); if(!query) return; window.location.href="index.html?search=" + encodeURIComponent(query); }); headerSearchInput.addEventListener("search", ()=>{ if(!headerSearchInput.value.trim()){ headerSearchResults.classList.remove("show"); headerSearchResults.innerHTML=""; } }); }
document.addEventListener("click", e=>{ if(headerSearchResults && !e.target.closest("#searchInput") && !e.target.closest("#searchResults")){ headerSearchResults.classList.remove("show"); } });
window.onload=async ()=>{ await loadSiteContent(); await renderOfferBar(true); loadProducts(); updateCartUI(); updateAccountNavigation(); };
window.addEventListener("pageshow", async ()=>{ await loadSiteContent(); await renderOfferBar(true); loadProducts(); });
window.addEventListener("storage", async function(event){ if(["offers","homeContent"].includes(event.key)){ await loadSiteContent(); await renderOfferBar(true); } });
</script>
